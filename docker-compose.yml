
services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: unigpu-postgres
    environment:
      POSTGRES_USER: unigpu
      POSTGRES_PASSWORD: unigpu_secret
      POSTGRES_DB: unigpu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unigpu"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: unigpu-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unigpu-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://unigpu:unigpu_secret@postgres:5432/unigpu
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/uploads

  # ── Celery Worker ──
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unigpu-celery
    command: celery -A app.worker.celery_app worker --loglevel=info --beat
    environment:
      DATABASE_URL: postgresql+asyncpg://unigpu:unigpu_secret@postgres:5432/unigpu
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  pgdata:
  uploads:
